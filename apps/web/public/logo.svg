    <path d="M60 10C60 10 55 8 48 8c-8 0-15 3-20 8s-8 12-8 20c0 6 2 11 4 15 2 5 3 10 2 15-1 4-2 8-1 12 1 5 4 9 8 12 3 2 6 4 10 5 3 1 7 1 10 0l7-3V10Z" fill="#1a6fc4"/>
    <!-- Darker brain folds -->
    <path d="M20 36c8-2 16 1 22 6" stroke="#145a9e" stroke-width="3" fill="none" opacity="0.5"/>
    <path d="M22 50c6-4 14-4 20 0" stroke="#145a9e" stroke-width="3" fill="none" opacity="0.5"/>
    <path d="M25 64c5-3 12-2 18 2" stroke="#145a9e" stroke-width="3" fill="none" opacity="0.5"/>
    <path d="M30 76c4-2 10-1 14 2" stroke="#145a9e" stroke-width="2.5" fill="none" opacity="0.4"/>

    <!-- Neural network connections -->
    <line x1="28" y1="24" x2="42" y2="20" stroke="#5bb8ff" stroke-width="1.2" opacity="0.7"/>
    <line x1="28" y1="24" x2="36" y2="36" stroke="#5bb8ff" stroke-width="1.2" opacity="0.7"/>
    <line x1="42" y1="20" x2="52" y2="28" stroke="#5bb8ff" stroke-width="1.2" opacity="0.7"/>
    <line x1="42" y1="20" x2="36" y2="36" stroke="#5bb8ff" stroke-width="1.2" opacity="0.6"/>
    <line x1="36" y1="36" x2="52" y2="28" stroke="#5bb8ff" stroke-width="1.2" opacity="0.7"/>
    <line x1="36" y1="36" x2="26" y2="48" stroke="#5bb8ff" stroke-width="1.2" opacity="0.7"/>
    <line x1="36" y1="36" x2="46" y2="46" stroke="#5bb8ff" stroke-width="1.2" opacity="0.7"/>
    <line x1="52" y1="28" x2="46" y2="46" stroke="#5bb8ff" stroke-width="1.2" opacity="0.6"/>
    <line x1="26" y1="48" x2="46" y2="46" stroke="#5bb8ff" stroke-width="1.2" opacity="0.6"/>
    <line x1="26" y1="48" x2="32" y2="60" stroke="#5bb8ff" stroke-width="1.2" opacity="0.7"/>
    <line x1="46" y1="46" x2="54" y2="56" stroke="#5bb8ff" stroke-width="1.2" opacity="0.7"/>
    <line x1="46" y1="46" x2="32" y2="60" stroke="#5bb8ff" stroke-width="1.2" opacity="0.6"/>
    <line x1="32" y1="60" x2="42" y2="72" stroke="#5bb8ff" stroke-width="1.2" opacity="0.7"/>
    <line x1="54" y1="56" x2="42" y2="72" stroke="#5bb8ff" stroke-width="1.2" opacity="0.6"/>
    <line x1="32" y1="60" x2="54" y2="56" stroke="#5bb8ff" stroke-width="1.2" opacity="0.5"/>
    <line x1="42" y1="72" x2="50" y2="82" stroke="#5bb8ff" stroke-width="1.2" opacity="0.6"/>
    <line x1="54" y1="56" x2="50" y2="82" stroke="#5bb8ff" stroke-width="1" opacity="0.4"/>

    <!-- Neural nodes -->
    <circle cx="28" cy="24" r="4" fill="#4ab4ff"/>
    <circle cx="42" cy="20" r="3.5" fill="#4ab4ff"/>
    <circle cx="52" cy="28" r="3" fill="#4ab4ff"/>
    <circle cx="36" cy="36" r="4" fill="#4ab4ff"/>
    <circle cx="26" cy="48" r="3.5" fill="#4ab4ff"/>
    <circle cx="46" cy="46" r="4" fill="#4ab4ff"/>
    <circle cx="32" cy="60" r="3.5" fill="#4ab4ff"/>
    <circle cx="54" cy="56" r="3" fill="#4ab4ff"/>
    <circle cx="42" cy="72" r="3.5" fill="#4ab4ff"/>
    <circle cx="50" cy="82" r="3" fill="#4ab4ff"/>

    <!-- Node highlights -->
    <circle cx="28" cy="23" r="1.5" fill="white" opacity="0.6"/>
    <circle cx="36" cy="35" r="1.5" fill="white" opacity="0.6"/>
    <circle cx="46" cy="45" r="1.5" fill="white" opacity="0.6"/>
    <circle cx="32" cy="59" r="1.5" fill="white" opacity="0.6"/>
    <circle cx="42" cy="71" r="1.5" fill="white" opacity="0.6"/>
  </g>

  <!-- RIGHT BRAIN — Spain flag (red + gold + map) -->
  <g clip-path="url(#brain-right)">
    <!-- Red base -->
    <path d="M60 10v85l7 3c3 1 7 1 10 0 4-1 7-3 10-5 4-3 7-7 8-12 1-4 0-8-1-12-1-5 0-10 2-15 2-4 4-9 4-15 0-8-3-15-8-20s-12-8-20-8c-7 0-12 2-12 2Z" fill="#c8102e"/>
    <!-- Brain fold textures -->
    <path d="M60 36c6-3 14-3 22 2" stroke="#a00d25" stroke-width="3" fill="none" opacity="0.4"/>
    <path d="M60 64c5-3 12-3 18 1" stroke="#a00d25" stroke-width="3" fill="none" opacity="0.4"/>
    <path d="M62 78c4-2 10-1 14 2" stroke="#a00d25" stroke-width="2.5" fill="none" opacity="0.3"/>

    <!-- Gold band (bandera) -->
    <rect x="60" y="42" width="42" height="22" fill="#f1bf00" rx="0"/>
    <!-- Gold band subtle gradient overlay -->
    <rect x="60" y="42" width="42" height="11" fill="#f5cc33" opacity="0.3" rx="0"/>

    <!-- Spain map silhouette in gold band -->
    <path d="M70 46c2-1 5-1 8 0 3 1 6 1 8 0 2-1 3 0 4 1 1 2 0 4-1 5-2 2-4 3-7 3-2 0-4 0-6-1-2-1-4-2-5-1-2 1-3 3-3 5 0 1 1 2 2 2 2 0 3-1 4-2" fill="#c8102e" opacity="0.85"/>
  </g>

  <!-- Center divider line -->
  <line x1="60" y1="10" x2="60" y2="95" stroke="white" stroke-width="0.5" opacity="0.3"/>
</svg>
