services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: espanaia
      POSTGRES_USER: espanaia
      POSTGRES_PASSWORD: espanaia
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U espanaia"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
