<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <clipPath id="brain-left">
      <path d="M60 10C60 10 55 8 48 8c-8 0-15 3-20 8s-8 12-8 20c0 6 2 11 4 15 2 5 3 10 2 15-1 4-2 8-1 12 1 5 4 9 8 12 3 2 6 4 10 5 3 1 7 1 10 0l7-3V10Z"/>
    </clipPath>
    <clipPath id="brain-right">
      <path d="M60 10v85l7 3c3 1 7 1 10 0 4-1 7-3 10-5 4-3 7-7 8-12 1-4 0-8-1-12-1-5 0-10 2-15 2-4 4-9 4-15 0-8-3-15-8-20s-12-8-20-8c-7 0-12 2-12 2Z"/>
    </clipPath>
  </defs>

  <!-- LEFT BRAIN — AI Neural Network (blue) -->
  <g clip-path="url(#brain-left)">
